openapi: 3.0.3

info:
  title: Claude API
  description: >
    Community documentation for the Anthropic Claude API.
    This is a learning project built to practice API documentation
    and Docs-as-Code workflows.
  version: 1.0.0
  contact:
    name: Mohamed Arshe
    url: https://github.com/marshe-tw

servers:
  - url: https://api.anthropic.com
    description: Anthropic Production Server

paths:
  /v1/messages:
    post:
      summary: Create a message
      description: >
        Send a structured list of input messages and receive
        a model-generated response. This is the core endpoint
        of the Claude API.
      operationId: createMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model
                - messages
                - max_tokens
              properties:
                model:
                  type: string
                  example: claude-sonnet-4-6
                  description: The Claude model to use
                max_tokens:
                  type: integer
                  example: 1024
                  description: Maximum number of tokens in the response
                messages:
                  type: array
                  description: List of messages in the conversation
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum:
                          - user
                          - assistant
                        description: Who is sending the message
                      content:
                        type: string
                        description: The message content
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: msg_abc123
                    description: Unique message identifier
                  type:
                    type: string
                    example: message
                  role:
                    type: string
                    example: assistant
                  content:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          example: text
                        text:
                          type: string
                          example: Hello! How can I help you today?
                  model:
                    type: string
                    example: claude-sonnet-4-6
                  stop_reason:
                    type: string
                    example: end_turn
        '401':
          description: Authentication error - invalid or missing API key
        '429':
          description: Rate limit exceeded - too many requests
        '500':
          description: Internal server error

  /v1/models:
    get:
      summary: List available models
      description: Returns a list of all available Claude models.
      operationId: listModels
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          example: claude-sonnet-4-6
                        display_name:
                          type: string
                          example: Claude Sonnet 4.6
                        created_at:
                          type: string
                          example: '2025-01-01'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Your Anthropic API key from console.anthropic.com

security:
  - ApiKeyAuth: []
